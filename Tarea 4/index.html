
<script type="text/javascript">
    var valor1 = Number(prompt("Introduce el primer numero:"));
    var valor2 = Number(prompt("Introduce el segundo numero:"));
    for (var i = 1; i <= 5; i++) {
        if (i == 1) {
            var suma = valor1 + valor2;
            alert("La suma es: " + suma);
        }
        else if (i == 2) {
            var resta = valor1 - valor2;
            alert("La resta es: " + resta);
        }
        else if (i == 3) {
            var multiplicacion = valor1 * valor2;
            alert("La multiplicacion es: " + multiplicacion);
        }
        else if (i == 4) {
            var division = valor1 / valor2;
            alert("La division es: " + division);
        }
        else if (i == 5) {
            var mod = valor1 % valor2;
            alert("El modulo es: " + mod);
        }
    }
</script>
